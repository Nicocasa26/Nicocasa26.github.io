<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Verificación | CONEMAT</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#f5f6f7;
padding:40px;
text-align:center;
}

.card{
background:white;
padding:30px;
max-width:600px;
margin:auto;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.ok{color:green;font-weight:bold}
.error{color:red}

ul{
text-align:left;
margin-top:15px;
}

</style>

</head>

<body>

<div class="card">

<h2>Verificación de Capacitación</h2>

<div id="resultado">Validando...</div>

</div>

<script>

/* SUPABASE */

const SUPABASE_URL="https://brdekhbqophvcobhxdgc.supabase.co"
const SUPABASE_KEY="sb_publishable_CTkAN6flGJDQGVYV2VDUTg_Ov8CuhXn"

const {createClient}=supabase
const client=createClient(SUPABASE_URL,SUPABASE_KEY)

/* PARAMS */

const params=new URLSearchParams(window.location.search)
const id=params.get("id")

async function verificar(){

/* VALIDAR ID */

if(!id){
document.getElementById("resultado").innerHTML="<p class='error'>ID inválido</p>"
return
}

/* TRAER CAPACITACIÓN */

const {data,error}=await client
.from("capacitaciones_empresas")
.select(`
empresas(nombre),
capacitaciones_base(nombre),
fecha_inicio
`)
.eq("id",id)
.single()

if(error || !data){
document.getElementById("resultado").innerHTML="<p class='error'>Capacitación no encontrada</p>"
return
}

/* TRAER ASISTENTES */

const {data:asistentes,error:errAsistentes}=await client
.from("asistentes")
.select("nombre,dni")
.eq("capacitacion_id",id)

if(errAsistentes){
document.getElementById("resultado").innerHTML="<p class='error'>Error cargando asistentes</p>"
return
}

/* ARMAR HTML */

let html=`
<p class="ok">✔ Capacitación válida</p>

<p><b>Empresa:</b> ${data.empresas.nombre}</p>
<p><b>Capacitación:</b> ${data.capacitaciones_base.nombre}</p>
<p><b>Fecha:</b> ${data.fecha_inicio}</p>

<h3>Asistentes</h3>
`

/* SI NO HAY ASISTENTES */

if(!asistentes || asistentes.length === 0){

html += `<p>No hay asistentes registrados</p>`

} else {

html += `<ul>`

asistentes.forEach(a=>{
html += `<li>${a.nombre} - DNI ${a.dni}</li>`
})

html += `</ul>`

}

document.getElementById("resultado").innerHTML=html

}

/* INIT */

verificar()

</script>

</body>
</html>
