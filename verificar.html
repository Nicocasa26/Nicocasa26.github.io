<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<!-- Meta clave para que el celular no deforme el diseño[cite: 1] -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificación | CONEMAT</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  padding: 20px;
  box-sizing: border-box;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 12px;
  width: 100%;
  max-width: 400px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  box-sizing: border-box;
}

h2 { margin-bottom: 15px; font-size: 1.5rem; color: #1e293b; }

#estado { margin-bottom: 20px; font-size: 1.1rem; }

.ok { color: #16a34a; font-weight: bold; }
.error { color: #dc2626; font-weight: bold; }

.label { font-weight: bold; color: #475569; }

p {
  margin: 10px 0;
  line-height: 1.5;
  color: #334155;
  word-wrap: break-word;
}

h4 {
  margin-top: 25px;
  margin-bottom: 10px;
  border-bottom: 2px solid #f1f5f9;
  padding-bottom: 5px;
  text-align: left;
}

.asistentes {
  text-align: left;
  font-size: 14px;
  max-height: 250px;
  overflow-y: auto;
}

.asistentes div {
  padding: 8px 0;
  border-bottom: 1px solid #f1f5f9;
}
</style>
</head>

<body>

<div class="card">
  <h2>Verificación de Capacitación</h2>
  <div id="estado">Cargando datos...</div>

  <div id="contenido" style="display:none">
    <p><span class="label">Empresa:</span><br><span id="empresa"></span></p>
    <p><span class="label">Capacitación:</span><br><span id="capacitacion"></span></p>
    <p><span class="label">Fecha:</span> <span id="fecha"></span></p>

    <h4>Asistentes</h4>
    <div class="asistentes" id="lista"></div>
  </div>
</div>

<script>
/* CONFIGURACIÓN SUPABASE */
const SUPABASE_URL = "https://brdekhbqophvcobhxdgc.supabase.co";
const SUPABASE_KEY = "sb_publishable_CTkAN6flGJDQGVYV2VDUTg_Ov8CuhXn";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

async function cargar() {
  const estadoDiv = document.getElementById("estado");
  const contenidoDiv = document.getElementById("contenido");

  if (!id) {
    estadoDiv.innerHTML = "<span class='error'>ID de verificación no válido</span>";
    return;
  }

  try {
    /* TRAER CAPACITACIÓN CON RELACIONES[cite: 9] */
    const { data, error } = await client
      .from("capacitaciones_empresas")
      .select(`
        id,
        fecha_inicio,
        empresas(nombre),
        capacitaciones_base(nombre)
      `)
      .eq("id", id)
      .single();

    if (error || !data) {
      estadoDiv.innerHTML = "<span class='error'>Capacitación no encontrada</span>";
      return;
    }

    /* CARGAR ASISTENTES[cite: 9] */
    const { data: asistentes } = await client
      .from("asistentes")
      .select("nombre,dni")
      .eq("capacitacion_id", id);

    /* RENDERIZAR DATOS CON FIX PARA MÓVILES[cite: 1, 9] */
    
    // El fix: Manejamos si empresas viene como objeto o como array de un elemento
    let nombreEmpresa = "N/A";
    if (data.empresas) {
      nombreEmpresa = Array.isArray(data.empresas) ? data.empresas[0]?.nombre : data.empresas.nombre;
    }

    document.getElementById("empresa").innerText = nombreEmpresa;
    document.getElementById("capacitacion").innerText = data.capacitaciones_base?.nombre || "N/A";
    document.getElementById("fecha").innerText = data.fecha_inicio || "-";

    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    if (!asistentes || asistentes.length === 0) {
      lista.innerHTML = "<div>No hay asistentes registrados.</div>";
    } else {
      asistentes.forEach(a => {
        lista.innerHTML += `<div><strong>${a.nombre}</strong> - DNI: ${a.dni}</div>`;
      });
    }

    // Mostrar contenido final
    estadoDiv.innerHTML = "<span class='ok'>✔ Capacitación válida</span>";
    contenidoDiv.style.display = "block";

  } catch (err) {
    console.error("Error:", err);
    estadoDiv.innerHTML = "<span class='error'>Error al conectar con la base de datos</span>";
  }
}

// Ejecución
cargar();
</script>

</body>
</html>
