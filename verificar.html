<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Verificación | CONEMAT</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
  font-family:Arial;
  background:#f4f6f8;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:white;
  padding:30px;
  border-radius:10px;
  width:380px;
  text-align:center;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h2{
  margin-bottom:10px;
}

.ok{
  color:green;
  font-weight:bold;
}

.error{
  color:red;
  font-weight:bold;
}

.label{
  font-weight:bold;
}

.asistentes{
  margin-top:15px;
  text-align:left;
  font-size:14px;
  max-height:200px;
  overflow:auto;
}

.asistentes div{
  padding:4px 0;
  border-bottom:1px solid #eee;
}

</style>

</head>

<body>

<div class="card">

<h2>Verificación de Capacitación</h2>

<div id="estado">Cargando...</div>

<div id="contenido" style="display:none">

<p><span class="label">Empresa:</span> <span id="empresa"></span></p>
<p><span class="label">Capacitación:</span> <span id="capacitacion"></span></p>
<p><span class="label">Fecha:</span> <span id="fecha"></span></p>

<h4>Asistentes</h4>
<div class="asistentes" id="lista"></div>

</div>

</div>

<script>

/* SUPABASE */

const SUPABASE_URL = "https://brdekhbqophvcobhxdgc.supabase.co";
const SUPABASE_KEY = "sb_publishable_CTkAN6flGJDQGVYV2VDUTg_Ov8CuhXn";

const {createClient}=supabase
const client=createClient(SUPABASE_URL,SUPABASE_KEY)

/* PARAM */

const params=new URLSearchParams(window.location.search)
const id=params.get("id")

/* INIT */

async function cargar(){

if(!id){
document.getElementById("estado").innerHTML="<span class='error'>ID inválido</span>"
return
}

/* TRAER CAPACITACION */

const {data,error}=await client
.from("capacitaciones_empresas")
.select(`
  id,
  fecha_inicio,
  empresas(nombre),
  capacitaciones_base(nombre)
`)
.eq("id",id)
.single()

if(error || !data){
document.getElementById("estado").innerHTML="<span class='error'>Capacitación no encontrada</span>"
return
}

/* MOSTRAR OK */

document.getElementById("estado").innerHTML="<span class='ok'>✔ Capacitación válida</span>"
document.getElementById("contenido").style.display="block"

/* SET DATA */

document.getElementById("empresa").innerText=data.empresas.nombre
document.getElementById("capacitacion").innerText=data.capacitaciones_base.nombre
document.getElementById("fecha").innerText=data.fecha_inicio

/* TRAER ASISTENTES */

const {data:asistentes}=await client
.from("asistentes")
.select("nombre,dni")
.eq("capacitacion_id",id)

/* LISTAR */

const lista=document.getElementById("lista")

if(!asistentes || asistentes.length===0){
lista.innerHTML="<div>No hay asistentes registrados</div>"
return
}

asistentes.forEach(a=>{
lista.innerHTML+=`<div>${a.nombre} - DNI ${a.dni}</div>`
})

}

cargar()

</script>

</body>
</html>
