<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Capacitaciones Base | CONEMAT</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
padding:40px;
background:#f4f6f8;
}

button{
padding:8px 12px;
margin-right:6px;
cursor:pointer;
}

.card{

background:white;
padding:20px;
margin-bottom:25px;
border-radius:8px;

}

iframe{
width:100%;
height:400px;
border:none;
margin-top:10px;
}

.edit{
background:#f59e0b;
color:white;
border:none;
}

.delete{
background:#dc2626;
color:white;
border:none;
}

</style>

</head>

<body>

<h2>Capacitaciones Base</h2>

<button onclick="volver()">← Volver</button>
<button onclick="nuevaCapacitacion()">+ Agregar capacitación</button>

<br><br>

<div id="contenedor"></div>

<script>

const SUPABASE_URL = "https://brdekhbqophvcobhxdgc.supabase.co";
const SUPABASE_KEY = "sb_publishable_CTkAN6flGJDQGVYV2VDUTg_Ov8CuhXn";

const { createClient } = supabase
const client = createClient(SUPABASE_URL,SUPABASE_KEY)


function volver(){

window.location.href="index.html"

}


/* CARGAR CAPACITACIONES */

async function cargarCapacitaciones(){

const { data } = await client
.from("capacitaciones_base")
.select("*")
.order("titulo")

const contenedor=document.getElementById("contenedor")

contenedor.innerHTML=""

data.forEach(c=>{

const video = c.youtube.replace("watch?v=","embed/")

contenedor.innerHTML+=`

<div class="card">

<h3>${c.titulo}</h3>

<p>
${c.descripcion}<br>
Duración: ${c.duracion} minutos<br>
Estado: <span style="color:green">Activa</span>
</p>

<button class="edit"
onclick="editarCapacitacion(
'${c.id}',
'${c.titulo}',
'${c.descripcion}',
'${c.youtube}',
'${c.duracion}'
)">
Editar
</button>

<button class="delete"
onclick="borrarCapacitacion('${c.id}','${c.titulo}')">
Eliminar
</button>

<iframe src="${video}"></iframe>

</div>

`

})

}


/* NUEVA CAPACITACION */

async function nuevaCapacitacion(){

const titulo=prompt("Título capacitación")
if(!titulo) return

const descripcion=prompt("Descripción")
if(!descripcion) return

const youtube=prompt("Link YouTube")
if(!youtube) return

const duracion=prompt("Duración en minutos")
if(!duracion) return

await client
.from("capacitaciones_base")
.insert({
titulo,
descripcion,
youtube,
duracion
})

cargarCapacitaciones()

}


/* EDITAR */

async function editarCapacitacion(id,titulo,descripcion,youtube,duracion){

const nuevoTitulo=prompt("Título",titulo)
if(!nuevoTitulo) return

const nuevaDescripcion=prompt("Descripción",descripcion)
if(!nuevaDescripcion) return

const nuevoYoutube=prompt("Link YouTube",youtube)
if(!nuevoYoutube) return

const nuevaDuracion=prompt("Duración",duracion)
if(!nuevaDuracion) return

await client
.from("capacitaciones_base")
.update({

titulo:nuevoTitulo,
descripcion:nuevaDescripcion,
youtube:nuevoYoutube,
duracion:nuevaDuracion

})
.eq("id",id)

cargarCapacitaciones()

}


/* BORRAR */

async function borrarCapacitacion(id,titulo){

const confirmar=confirm(

`¿Eliminar capacitación "${titulo}"?

Si esta capacitación está asignada a empresas,
también se eliminarán sus registros.`

)

if(!confirmar) return

await client
.from("capacitaciones_base")
.delete()
.eq("id",id)

cargarCapacitaciones()

}

cargarCapacitaciones()

</script>

</body>
</html>
