<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Capacitaciones Base | CONEMAT</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
padding:40px;
background:#f4f6f8;
}

button{
padding:8px 12px;
margin-right:6px;
cursor:pointer;
}

.card{
background:white;
padding:20px;
margin-bottom:25px;
border-radius:8px;
}

iframe{
width:100%;
height:400px;
border:none;
margin-top:10px;
}

.edit{
background:#f59e0b;
color:white;
border:none;
}

.delete{
background:#dc2626;
color:white;
border:none;
}

</style>

</head>

<body>

<h2>Capacitaciones Base</h2>

<button onclick="volver()">← Volver</button>
<button onclick="nuevaCapacitacion()">+ Agregar capacitación</button>

<br><br>

<div id="contenedor"></div>

<script>

/* SUPABASE */

const SUPABASE_URL = "https://brdekhbqophvcobhxdgc.supabase.co";
const SUPABASE_KEY = "sb_publishable_CTkAN6flGJDQGVYV2VDUTg_Ov8CuhXn";

const { createClient } = supabase
const client = createClient(SUPABASE_URL,SUPABASE_KEY)

/* VOLVER */

function volver(){
window.location.href="index.html"
}


/* CARGAR CAPACITACIONES */

async function cargarCapacitaciones(){

const { data, error } = await client
.from("capacitaciones_base")
.select("*")
.order("nombre")

if(error){
console.log(error)
alert(error.message)
return
}

const contenedor=document.getElementById("contenedor")
contenedor.innerHTML=""

data.forEach(c=>{

let video=""

if(c.url_video){
video=c.url_video.replace("watch?v=","embed/")
}

contenedor.innerHTML+=`

<div class="card">

<h3>${c.nombre}</h3>

<p>
${c.descripcion ?? ""}<br>
Duración: ${c.duracion_minutos ?? ""} minutos<br>
Estado: <span style="color:green">Activa</span>
</p>

<button class="edit"
onclick="editarCapacitacion(
'${c.id}',
'${c.nombre}',
'${c.descripcion ?? ""}',
'${c.url_video ?? ""}',
'${c.duracion_minutos ?? ""}'
)">
Editar
</button>

<button class="delete"
onclick="borrarCapacitacion('${c.id}','${c.nombre}')">
Eliminar
</button>

${video ? `<iframe src="${video}"></iframe>` : ""}

</div>

`

})

}


/* NUEVA CAPACITACION */

async function nuevaCapacitacion(){

const nombre=prompt("Nombre capacitación")
if(!nombre) return

const descripcion=prompt("Descripción")
if(!descripcion) return

const video=prompt("Link YouTube")
if(!video) return

const duracion=prompt("Duración en minutos")
if(!duracion) return

const { error } = await client
.from("capacitaciones_base")
.insert([
{
nombre:nombre,
descripcion:descripcion,
url_video:video,
duracion_minutos:duracion
}
])

if(error){
console.log(error)
alert(error.message)
return
}

cargarCapacitaciones()

}


/* EDITAR */

async function editarCapacitacion(id,nombre,descripcion,video,duracion){

const nuevoNombre=prompt("Nombre",nombre)
if(!nuevoNombre) return

const nuevaDescripcion=prompt("Descripción",descripcion)
if(!nuevaDescripcion) return

const nuevoVideo=prompt("Link YouTube",video)
if(!nuevoVideo) return

const nuevaDuracion=prompt("Duración",duracion)
if(!nuevaDuracion) return

const { error } = await client
.from("capacitaciones_base")
.update({

nombre:nuevoNombre,
descripcion:nuevaDescripcion,
url_video:nuevoVideo,
duracion_minutos:nuevaDuracion

})
.eq("id",id)

if(error){
console.log(error)
alert(error.message)
return
}

cargarCapacitaciones()

}


/* BORRAR */

async function borrarCapacitacion(id,nombre){

const confirmar=confirm(

`¿Eliminar capacitación "${nombre}"?

Si esta capacitación está asignada a empresas
también se eliminarán sus registros.`

)

if(!confirmar) return

const { error } = await client
.from("capacitaciones_base")
.delete()
.eq("id",id)

if(error){
console.log(error)
alert(error.message)
return
}

cargarCapacitaciones()

}


/* INIT */

cargarCapacitaciones()

</script>

</body>
</html>
