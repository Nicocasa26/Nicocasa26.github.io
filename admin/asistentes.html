<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Asistentes | CONEMAT</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
font-family:Arial;
padding:30px;
background:#f5f6f7;
}

button{
padding:6px 10px;
margin-right:5px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:8px;
font-size:14px;
}

th{
background:#e5e7eb;
}

.edit{
background:#2563eb;
color:white;
border:none;
}

.delete{
background:#dc2626;
color:white;
border:none;
}
</style>

</head>

<body>

<h2>Asistentes registrados</h2>

<button onclick="volver()">← Volver</button>
<button onclick="generarPDF()">Generar PDF</button>

<table>
<thead>
<tr>
<th>#</th>
<th>Apellido y Nombre</th>
<th>DNI</th>
<th>Puesto</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="tabla"></tbody>
</table>

<script>

/* SUPABASE */

const SUPABASE_URL="https://brdekhbqophvcobhxdgc.supabase.co"
const SUPABASE_KEY="sb_publishable_CTkAN6flGJDQGVYV2VDUTg_Ov8CuhXn"

const {createClient}=supabase
const client=createClient(SUPABASE_URL,SUPABASE_KEY)

/* PARAMS */

const params=new URLSearchParams(window.location.search)
const capacitacionEmpresaId=params.get("capacitacion_empresa_id")

/* STATE */

let asistentes=[]
let empresa=""
let capacitacion=""

/* NAV */

function volver(){
window.history.back()
}

/* CONTEXTO */

async function cargarContexto(){

const {data}=await client
.from("capacitaciones_empresas")
.select(`
empresas(nombre),
capacitaciones_base(nombre)
`)
.eq("id",capacitacionEmpresaId)
.single()

empresa=data.empresas.nombre
capacitacion=data.capacitaciones_base.nombre

}

/* ASISTENTES */

async function cargarAsistentes(){

const {data}=await client
.from("asistentes")
.select("*")
.eq("capacitacion_id",capacitacionEmpresaId)
.order("nombre")

asistentes=data

const tabla=document.getElementById("tabla")
tabla.innerHTML=""

data.forEach((a,i)=>{

tabla.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${a.nombre}</td>
<td>${a.dni}</td>
<td>${a.puesto}</td>
<td>
<button class="edit" onclick="editar('${a.id}','${a.nombre}','${a.dni}','${a.puesto}')">Editar</button>
<button class="delete" onclick="eliminar('${a.id}')">Eliminar</button>
</td>
</tr>
`

})

}

/* EDITAR */

async function editar(id,nombre,dni,puesto){

const nuevoNombre=prompt("Apellido y Nombre",nombre)
if(!nuevoNombre) return

const nuevoDni=prompt("DNI",dni)
if(!nuevoDni) return

const nuevoPuesto=prompt("Puesto",puesto)
if(!nuevoPuesto) return

const {error}=await client
.from("asistentes")
.update({
nombre:nuevoNombre,
dni:nuevoDni,
puesto:nuevoPuesto
})
.eq("id",id)

if(error){
alert("Error al actualizar")
return
}

cargarAsistentes()

}

/* ELIMINAR */

async function eliminar(id){

if(!confirm("¿Eliminar asistente?")) return

const {error}=await client
.from("asistentes")
.delete()
.eq("id",id)

if(error){
alert("Error al eliminar")
return
}

cargarAsistentes()

}

/* PDF */

function generarPDF(){

const {jsPDF}=window.jspdf
const doc=new jsPDF()

const fecha=new Date().toLocaleDateString("es-AR")

const logo=new Image()
logo.src="../logo-black.png"

logo.onload=function(){

/* HEADER */

doc.addImage(logo,"PNG",15,8,25,0)

doc.setFont("helvetica","bold")
doc.setFontSize(18)
doc.text("REGISTRO DE CAPACITACIÓN",105,20,{align:"center"})

doc.setFont("helvetica","normal")
doc.setFontSize(10)
doc.setTextColor(100)

doc.text("Ley 19.587 – Decreto 351/79 – Resolución SRT 905/15",105,26,{align:"center"})

doc.setDrawColor(200)
doc.line(10,34,200,34)

/* DATOS */

let startY=48

doc.setFontSize(9)
doc.setTextColor(120)

doc.text("EMPRESA",12,startY)
doc.text("CAPACITACIÓN",12,startY+8)
doc.text("INSTRUCTOR",120,startY)
doc.text("FECHA",120,startY+8)

doc.setFont("helvetica","bold")
doc.setTextColor(0)

doc.text(empresa,12,startY+4)
doc.text(capacitacion,12,startY+12)

doc.text("Casanova Nicolás",120,startY+4)
doc.text(fecha,120,startY+12)

/* TABLA */

const rows=asistentes.map((a,i)=>[
i+1,
a.nombre,
a.dni,
a.puesto,
""
])

doc.autoTable({
startY:startY+20,
head:[["Nº","APELLIDO Y NOMBRE","DNI","PUESTO","FIRMA"]],
body:rows,
styles:{fontSize:9,cellPadding:4,valign:"middle",lineColor:[220,220,220],lineWidth:0.2},
headStyles:{fillColor:[240,240,240],textColor:[0,0,0],fontStyle:"bold"},
columnStyles:{4:{cellWidth:35}}
})

/* FIRMAS */

asistentes.forEach((a,i)=>{
if(a.firma){
const row=doc.lastAutoTable.body[i]
const cell=row.cells[4]
doc.addImage(a.firma,"PNG",cell.x+3,cell.y+4,28,10)
}
})

/* FIRMA PROFESIONAL */

let finalY = doc.lastAutoTable.finalY + 25

if(finalY > 240){
doc.addPage()
finalY = 40
}

const firma=new Image()
firma.src="Firma nicolas nueva.jpg"

firma.onload=function(){

doc.addImage(firma,"JPEG",140,finalY-20,45,20)

doc.line(130,finalY,190,finalY)

doc.setFontSize(10)
doc.setFont("helvetica","bold")
doc.text("Casanova Nicolás",160,finalY+6,{align:"center"})

doc.setFont("helvetica","normal")
doc.setFontSize(9)
doc.text("Lic. Higiene y Seguridad",160,finalY+11,{align:"center"})
doc.text("Mat. CPHS 6921",160,finalY+16,{align:"center"})

/* DISCLAIMER */

let disclaimerY = finalY + 40

if(disclaimerY > 280){
doc.addPage()
disclaimerY = 40
}

doc.setFontSize(8)
doc.setTextColor(120)

doc.text("Esta capacitación fue brindada en modalidad virtual. Los participantes registrados declararon haber accedido al contenido y comprendido los conceptos expuestos.",105,disclaimerY,{align:"center",maxWidth:180})

/* QR */

const urlVerificacion = `https://conemat.com.ar/verificar.html?id=${capacitacionEmpresaId}`

const qrContainer = document.createElement("div")
qrContainer.style.display = "none"
document.body.appendChild(qrContainer)

new QRCode(qrContainer,{
text:urlVerificacion,
width:80,
height:80
})

setTimeout(()=>{

const qrCanvas=qrContainer.querySelector("canvas")
const qrImage=qrCanvas.toDataURL("image/png")

let qrY = disclaimerY - 30

if(qrY < 20){
doc.addPage()
qrY = 40
}

doc.addImage(qrImage,"PNG",15,qrY,25,25)

doc.setFontSize(7)
doc.setTextColor(100)
doc.text("Verificar autenticidad",27,qrY+30,{align:"center"})

doc.save(`${empresa} - ${capacitacion}.pdf`)

},300)

}

}

}

/* INIT */

cargarContexto()
cargarAsistentes()

</script>

</body>
</html>
