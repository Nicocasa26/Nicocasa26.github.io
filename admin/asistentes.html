<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Asistentes | CONEMAT</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

<style>

body{
font-family:Arial;
padding:30px;
background:#f5f6f7;
}

button{
padding:6px 10px;
margin-right:5px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:8px;
font-size:14px;
}

th{
background:#e5e7eb;
}

.edit{
background:#2563eb;
color:white;
border:none;
}

.delete{
background:#dc2626;
color:white;
border:none;
}

</style>

</head>

<body>

<h2>Asistentes registrados</h2>

<button onclick="volver()">← Volver</button>
<button onclick="generarPDF()">Generar PDF</button>

<table>

<thead>
<tr>
<th>#</th>
<th>Apellido y Nombre</th>
<th>DNI</th>
<th>Puesto</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>

<script>

/* SUPABASE */

const SUPABASE_URL="https://brdekhbqophvcobhxdgc.supabase.co"
const SUPABASE_KEY="sb_publishable_CTkAN6flGJDQGVYV2VDUTg_Ov8CuhXn"

const {createClient}=supabase
const client=createClient(SUPABASE_URL,SUPABASE_KEY)

/* PARAMS */

const params=new URLSearchParams(window.location.search)
const capacitacionEmpresaId=params.get("capacitacion_empresa_id")

/* STATE */

let asistentes=[]
let empresa=""
let capacitacion=""

/* NAV */

function volver(){
window.history.back()
}

/* CONTEXTO */

async function cargarContexto(){

const {data}=await client
.from("capacitaciones_empresas")
.select(`
empresas(nombre),
capacitaciones_base(nombre)
`)
.eq("id",capacitacionEmpresaId)
.single()

empresa=data.empresas.nombre
capacitacion=data.capacitaciones_base.nombre

}

/* ASISTENTES */

async function cargarAsistentes(){

const {data}=await client
.from("asistentes")
.select("*")
.eq("capacitacion_id",capacitacionEmpresaId)
.order("nombre")

asistentes=data

const tabla=document.getElementById("tabla")
tabla.innerHTML=""

data.forEach((a,i)=>{

tabla.innerHTML+=`
<tr>

<td>${i+1}</td>

<td>${a.nombre}</td>

<td>${a.dni}</td>

<td>${a.puesto}</td>

<td>

<button class="edit" onclick="editar('${a.id}','${a.nombre}','${a.dni}','${a.puesto}')">
Editar
</button>

<button class="delete" onclick="eliminar('${a.id}')">
Eliminar
</button>

</td>

</tr>
`

})

}

/* EDITAR */

async function editar(id,nombre,dni,puesto){

const nuevoNombre=prompt("Apellido y Nombre",nombre)
if(!nuevoNombre) return

const nuevoDni=prompt("DNI",dni)
if(!nuevoDni) return

const nuevoPuesto=prompt("Puesto",puesto)
if(!nuevoPuesto) return

const {error}=await client
.from("asistentes")
.update({
nombre:nuevoNombre,
dni:nuevoDni,
puesto:nuevoPuesto
})
.eq("id",id)

if(error){
alert("Error al actualizar")
return
}

cargarAsistentes()

}

/* ELIMINAR */

async function eliminar(id){

if(!confirm("¿Eliminar asistente?")) return

const {error}=await client
.from("asistentes")
.delete()
.eq("id",id)

if(error){
alert("Error al eliminar")
return
}

cargarAsistentes()

}

/* PDF */

function generarPDF(){

const {jsPDF}=window.jspdf
const doc=new jsPDF()

const fecha=new Date().toLocaleDateString("es-AR")

const logo=new Image()
logo.src="../logo-black.png"

logo.onload=function(){

/* LOGO (NO CAMBIAMOS TAMAÑO) */

doc.addImage(logo,"PNG",15,10,35,0)

/* TITULO */

doc.setFontSize(16)
doc.setFont(undefined,"bold")

doc.text(
"REGISTRO DE CAPACITACIÓN",
105,
24,
{align:"center"}
)

/* SUBTITULO */

doc.setFontSize(9)
doc.setFont(undefined,"normal")

doc.text(
"Ley 19.587 – Decreto 351/79 – Resolución SRT 905/15",
105,
30,
{align:"center"}
)

/* LINEA DIVISORA (BAJADA) */

doc.setDrawColor(180)
doc.line(10,40,200,40)

/* DATOS */

doc.setFontSize(11)

doc.text(`EMPRESA: ${empresa}`,12,50)
doc.text(`CAPACITACIÓN: ${capacitacion}`,12,58)

doc.text(`INSTRUCTOR: Casanova Nicolás`,12,66)
doc.text(`FECHA: ${fecha}`,140,66)

/* TABLA */

const rows=asistentes.map((a,i)=>[
i+1,
a.nombre,
a.dni,
a.puesto,
""
])

doc.autoTable({

startY:75,

head:[[
"Nº",
"APELLIDO Y NOMBRE",
"DNI",
"PUESTO",
"FIRMA"
]],

body:rows,

styles:{
fontSize:9
},

headStyles:{
fillColor:[40,40,40]
}

})

/* FIRMA */

const finalY=doc.lastAutoTable.finalY+15

const firma=new Image()
firma.src="Firma nicolas nueva.jpg"

firma.onload=function(){

doc.addImage(firma,"JPEG",140,finalY,50,25)

doc.setFontSize(10)

doc.text(
"Casanova Nicolás\nLic. Higiene y Seguridad",
140,
finalY+32
)

doc.save(`${empresa} - ${capacitacion}.pdf`)

}

}

}

/* INIT */

cargarContexto()
cargarAsistentes()

</script>

</body>
</html>
