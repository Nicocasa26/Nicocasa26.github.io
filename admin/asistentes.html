<html lang="es">
<head>
<meta charset="UTF-8">

<script>
  // Credenciales reales de producción - Uso Local
  const SUPABASE_URL = "https://brdekhbqophvcobhxdgc.supabase.co";
  const SUPABASE_KEY = "sb_publishable_CTkAN6flGJDQGVYV2VDUTg_Ov8CuhXn";

  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  const client = supabaseClient; // Alias para compatibilidad

  // Verificación inmediata de la sesión
  checkAuth();

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

<style>
body{
font-family:Arial;
padding:30px;
background:#f5f6f7;
}

button{
padding:6px 10px;
margin-right:5px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:8px;
font-size:14px;
}

th{
background:#e5e7eb;
}

.edit{
background:#2563eb;
color:white;
border:none;
}

.edit-rol{
background:#10b981;
color:white;
border:none;
}

.delete{
background:#dc2626;
color:white;
border:none;
}
</style>

</head>

<body>

<h2>Asistentes registrados</h2>

<button onclick="volver()">← Volver</button>
<button onclick="generarPDF()">Generar PDF</button>
<button onclick="generarPDFEvacuacion()">Generar PDF Evacuación</button>

<table>
<thead>
<tr>
<th>#</th>
<th>Apellido y Nombre</th>
<th>DNI</th>
<th>Puesto</th>
<th>Rol Evacuación</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="tabla"></tbody>
</table>

<script>

/* PARAMS */
const params=new URLSearchParams(window.location.search)
const capacitacionEmpresaId=params.get("capacitacion_empresa_id")

/* STATE */
let asistentes=[]
let empresa="Empresa"
let capacitacion="Capacitación"

/* NAV */
function volver(){
window.history.back()
}

/* CONTEXTO SEGURO */
async function cargarContexto(){
try {
const {data, error}=await client
.from("capacitaciones_empresas")
.select(`
empresas(nombre),
capacitaciones_base(nombre)
`)
.eq("id",capacitacionEmpresaId)
.single()

if(error) {
console.error("Error cargando contexto:", error)
return
}

if(data){
empresa=data.empresas?.nombre || "Empresa"
capacitacion=data.capacitaciones_base?.nombre || "Capacitación"
}
} catch(err) {
console.error("Excepción en cargarContexto:", err)
}
}

/* ASISTENTES SEGURO */
async function cargarAsistentes(){
try {
const {data, error}=await client
.from("asistentes")
.select("*")
.eq("capacitacion_id",capacitacionEmpresaId)
.order("nombre")

if(error) {
console.error("Error en base de datos:", error)
alert("Error al conectar con la base de datos de asistentes.")
return
}

// Mantenemos los roles si ya se habían editado en la sesión actual
const rolesPrevios = {};
asistentes.forEach(a => {
  if(a.rol_evacuacion) rolesPrevios[a.id] = a.rol_evacuacion;
});

asistentes = data || []
const tabla=document.getElementById("tabla")
tabla.innerHTML=""

if(asistentes.length === 0) {
tabla.innerHTML = `<tr><td colspan="6" style="text-align:center;color:#64748b;">No hay asistentes registrados en esta capacitación.</td></tr>`
return
}

asistentes.forEach((a,i)=>{
// Restaurar rol temporal si existía en memoria
a.rol_evacuacion = rolesPrevios[a.id] || "";

tabla.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${a.nombre}</td>
<td>${a.dni}</td>
<td>${a.puesto}</td>
<td id="rol-${a.id}" style="font-weight:bold; color:#0f172a;">${a.rol_evacuacion}</td>
<td>
<button class="edit" onclick="editar('${a.id}','${a.nombre}','${a.dni}','${a.puesto}')">Editar Datos</button>
<button class="edit-rol" onclick="editarRol('${a.id}')">Asignar Rol</button>
<button class="delete" onclick="eliminar('${a.id}')">Eliminar</button>
</td>
</tr>
`
})
} catch(err) {
console.error("Excepción en cargarAsistentes:", err)
}
}

/* ASIGNAR ROL MANUAL (TEMPORAL PARA EL PDF DE EVACUACIÓN) */
function editarRol(id) {
  const asistente = asistentes.find(a => a.id === id);
  if(!asistente) return;
  
  const nuevoRol = prompt("Ingrese el Rol de Evacuación (ej: Jefe de Evacuación, Grupo de Auxilio, etc.):", asistente.rol_evacuacion || "");
  if(nuevoRol === null) return; // Si cancela, no hace nada
  
  asistente.rol_evacuacion = nuevoRol;
  document.getElementById(`rol-${id}`).innerText = nuevoRol;
}

/* EDITAR */
async function editar(id,nombre,dni,puesto){
const nuevoNombre=prompt("Apellido y Nombre",nombre)
if(!nuevoNombre) return

const nuevoDni=prompt("DNI",dni)
if(!nuevoDni) return

const nuevoPuesto=prompt("Puesto",puesto)
if(!nuevoPuesto) return

const {error}=await client
.from("asistentes")
.update({
nombre:nuevoNombre,
dni:nuevoDni,
puesto:nuevoPuesto
})
.eq("id",id)

if(error){
alert("Error al actualizar")
return
}
cargarAsistentes()
}

/* ELIMINAR */
async function eliminar(id){
if(!confirm("¿Eliminar asistente?")) return
const {error}=await client
.from("asistentes")
.delete()
.eq("id",id)

if(error){
alert("Error al eliminar")
return
}
cargarAsistentes()
}

/* PDF ORIGINAL PREMIUM (IGNORA EL ROL) */
function generarPDF(){
if(!asistentes || asistentes.length === 0){
alert("No hay asistentes cargados para exportar.")
return
}

const {jsPDF}=window.jspdf
const doc=new jsPDF()
const fecha=new Date().toLocaleDateString("es-AR")

const urlVerificacion = `https://conemat.com.ar/verificar.html?id=${capacitacionEmpresaId}`
const qrContainer = document.createElement("div")
qrContainer.style.display = "none"
document.body.appendChild(qrContainer)

new QRCode(qrContainer,{
text:urlVerificacion,
width:80,
height:80
})

setTimeout(()=>{
const qrCanvas=qrContainer.querySelector("canvas")
if(!qrCanvas) return
const qrImage=qrCanvas.toDataURL("image/png")

function decorarTodasLasPaginas(){
const pageCount = doc.getNumberOfPages()
for(let i=1;i<=pageCount;i++){
doc.setPage(i)
doc.setDrawColor(30, 91, 185) 
doc.setLineWidth(0.3)
doc.rect(8, 8, 194, 281) 

doc.addImage(qrImage,"PNG",14,253,25,25)
doc.setFontSize(8)
doc.setTextColor(148, 163, 184)
doc.text(
"Esta capacitación fue brindada en modalidad virtual. Los participantes registrados declararon haber accedido al contenido y comprendido los conceptos expuestos.",
43,266,{maxWidth:150}
)
}
}

const logo=new Image()
logo.onload = function(){ construirCuerpo(true); }
logo.onerror = function(){ construirCuerpo(false); }
logo.src="Logo vertical/logo-conemat.png"

function construirCuerpo(conLogo){
if(conLogo) {
doc.addImage(logo,"PNG",15,11,25,0)
}

doc.setFont("helvetica","bold")
doc.setFontSize(20)
doc.setTextColor(30, 91, 185)
doc.text("REGISTRO DE CAPACITACIÓN",195,22,{align:"right"})

doc.setFont("helvetica","normal")
doc.setFontSize(10)
doc.setTextColor(100, 116, 139)
doc.text("Ley 19.587 – Decreto 351/79 – Resolución SRT 905/15",195,28,{align:"right"})

doc.setDrawColor(226, 232, 240)
doc.setLineWidth(0.5)
doc.line(12,38,198,38)

let startY=50
doc.setFontSize(9)
doc.setFont("helvetica","bold")
doc.setTextColor(148, 163, 184)
doc.text("EMPRESA",15,startY)
doc.text("CAPACITACIÓN",15,startY+10)
doc.text("INSTRUCTOR",120,startY)
doc.text("FECHA",120,startY+10)

doc.setFont("helvetica","bold")
doc.setFontSize(11)
doc.setTextColor(15, 23, 42)
doc.text(empresa,15,startY+5)
doc.text(capacitacion,15,startY+15)
doc.text("Casanova Nicolás",120,startY+5)
doc.text(fecha,120,startY+15)

const rows=asistentes.map((a,i)=>[i+1, a.nombre, a.dni, a.puesto, ""])

doc.autoTable({
startY:startY+25,
head:[["Nº","APELLIDO Y NOMBRE","DNI","PUESTO","FIRMA"]],
body:rows,
theme: 'striped',
styles:{fontSize:9,cellPadding:5,valign:"middle",lineColor:[226, 232, 240],lineWidth:0.2, textColor:[51, 65, 85]},
headStyles:{fillColor:[30, 91, 185],textColor:[255,255,255],fontStyle:"bold"},
alternateRowStyles:{fillColor:[248, 250, 252]},
columnStyles:{4:{cellWidth:35}},
margin:{left:12, right:12}
})

asistentes.forEach((a,i)=>{
if(a.firma){
const row=doc.lastAutoTable.body[i]
const cell=row.cells[4]
doc.addImage(a.firma,"PNG",cell.x+3,cell.y+2,28,10)
}
})

let finalY = doc.lastAutoTable.finalY + 25
if(finalY > 225){ doc.addPage(); finalY = 45; }

const firma=new Image()
firma.onload = function(){
doc.addImage(firma,"JPEG",145,finalY-20,45,20)
finalizarDescarga();
}
firma.onerror = function(){
finalizarDescarga();
}
firma.src="Firma nicolas nueva.jpg"

function finalizarDescarga(){
doc.setDrawColor(30, 91, 185)
doc.line(135,finalY,195,finalY)
doc.setFontSize(10)
doc.setFont("helvetica","bold")
doc.setTextColor(15, 23, 42)
doc.text("Casanova Nicolás",165,finalY+6,{align:"center"})
doc.setFont("helvetica","normal")
doc.setFontSize(9)
doc.setTextColor(100, 116, 139)
doc.text("Lic. Higiene y Seguridad",165,finalY+11,{align:"center"})
doc.text("Mat. CPHS 6921",165,finalY+16,{align:"center"})

decorarTodasLasPaginas()
doc.save(`${empresa} - ${capacitacion}.pdf`)
}
}
},300)
}

alert("No hay asistentes cargados para exportar.")
return
}

qrContainer.style.display = "none"
document.body.appendChild(qrContainer)

new QRCode(qrContainer,{
text:urlVerificacion,

}
}

const logo=new Image()
logo.onload = function(){ construirCuerpoEvac(true); }

function construirCuerpoEvac(conLogo){

}

doc.setFont("helvetica","bold")
doc.setFontSize(18)
doc.setTextColor(30, 91, 185)
doc.text("REGISTRO DE CAPACITACIÓN",195,22,{align:"right"})

doc.setFont("helvetica","normal")
doc.setFontSize(10)
doc.setTextColor(100, 116, 139)
doc.text("Ley 19.587 – Decreto 351/79 – Resolución SRT 905/15",195,28,{align:"right"})

doc.setDrawColor(226, 232, 240)
doc.setLineWidth(0.5)
doc.line(12,38,198,38)

let startY=50

doc.setTextColor(148, 163, 184)

doc.text("CAPACITACIÓN",15,startY+10)
doc.text("INSTRUCTOR",120,startY)
doc.text("FECHA",120,startY+10)

doc.setFont("helvetica","bold")

doc.setTextColor(15, 23, 42)
doc.text(empresa,15,startY+5)
doc.text(capacitacion + " (Evacuación)",15,startY+15)

// Acá mapeamos el 'rol_evacuacion' que pusiste a mano en pantalla
const rows=asistentes.map((a,i)=>[i+1, a.nombre, a.rol_evacuacion || "", a.dni, a.puesto, ""])

doc.autoTable({
startY:startY+25,
head:[["Nº","APELLIDO Y NOMBRE","ROL EVACUACIÓN","DNI","PUESTO","FIRMA"]],
body:rows,
theme: 'striped',
styles:{fontSize:9,cellPadding:5,valign:"middle",lineColor:[226, 232, 240],lineWidth:0.2, textColor:[51, 65, 85]},
headStyles:{fillColor:[30, 91, 185],textColor:[255,255,255],fontStyle:"bold"},
alternateRowStyles:{fillColor:[248, 250, 252]},
columnStyles:{
  2:{cellWidth:32},
  5:{cellWidth:35}
},
margin:{left:12, right:12}
})

asistentes.forEach((a,i)=>{
if(a.firma){
const row=doc.lastAutoTable.body[i]
const cell=row.cells[5] 
doc.addImage(a.firma,"PNG",cell.x+3,cell.y+2,28,10)
}
})

let finalY = doc.lastAutoTable.finalY + 25
if(finalY > 225){ doc.addPage(); finalY = 45; }

const firma=new Image()
firma.onload = function(){

}
firma.onerror = function(){
finalizarDescargaEvac();
}
firma.src="Firma nicolas nueva.jpg"

function finalizarDescargaEvac(){
doc.setDrawColor(30, 91, 185)
doc.line(135,finalY,195,finalY)
doc.setFontSize(10)
doc.setFont("helvetica","bold")
doc.setTextColor(15, 23, 42)
doc.text("Casanova Nicolás",165,finalY+6,{align:"center"})
doc.setFont("helvetica","normal")
doc.setFontSize(9)
doc.setTextColor(100, 116, 139)
doc.text("Lic. Higiene y Seguridad",165,finalY+11,{align:"center"})
doc.text("Mat. CPHS 6921",165,finalY+16,{align:"center"})

decorarTodasLasPaginasEvac()
doc.save(`${empresa} - ${capacitacion} (Evacuacion).pdf`)
}
}
},300)
}

/* INIT */
cargarContexto()
cargarAsistentes()

</script>

</body>
</html>
