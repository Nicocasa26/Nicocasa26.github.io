<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Empresas | CONEMAT</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>

    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        .header-container {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .btn-back {
            display: flex; align-items: center; justify-content: center;
            width: 45px; height: 45px; border-radius: 12px;
            background: white; color: #64748b; border: 1px solid var(--border);
            text-decoration: none; transition: all 0.2s ease;
        }

        .btn-back:hover {
            color: var(--primary); border-color: var(--primary);
            transform: translateX(-4px);
        }

        h1 { margin: 0; font-size: 28px; }

        .actions-bar {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 20px;
        }

        .search-input {
            padding: 10px 15px; border-radius: 8px;
            border: 1px solid var(--border); width: 300px;
        }

        .btn-new {
            background-color: var(--primary); color: white;
            padding: 10px 20px; border-radius: 8px;
            border: none; cursor: pointer; font-weight: 600;
        }

        table {
            width: 100%; background: white; border-collapse: collapse;
            border-radius: 12px; overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        th {
            background-color: #f1f5f9; padding: 15px;
            text-align: left; font-size: 13px; color: #64748b;
        }

        td { padding: 15px; border-bottom: 1px solid var(--border); }

        .btn-action {
            background: none; border: none; cursor: pointer;
            font-weight: 600; margin-right: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="header-container">
            <a href="index.html" class="btn-back">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </a>
            <h1>Gestión de Empresas</h1>
        </header>

        <div class="actions-bar">
            <input type="text" class="search-input" placeholder="Buscar empresa..." id="buscador">
            <!-- Corregido: La función debe coincidir con la del script -->
            <button class="btn-new" onclick="nuevaEmpresa()">+ Nueva empresa</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Empresa</th>
                    <th>Dirección</th>
                    <th>Contacto</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla-empresas"></tbody>
        </table>
    </div>

    <script>
        const SUPABASE_URL = "https://brdekhbqophvcobhxdgc.supabase.co";
        const SUPABASE_KEY = "sb_publishable_CTkAN6flGJDQGVYV2VDUTg_Ov8CuhXn";
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 1. CARGAR EMPRESAS
        async function cargarEmpresas() {
            const { data: empresas, error } = await client
                .from('empresas')
                .select('*')
                .order('nombre', { ascending: true });

            if (error) return console.error(error);

            const tbody = document.getElementById('tabla-empresas');
            tbody.innerHTML = '';

            empresas.forEach(emp => {
                tbody.innerHTML += `
                    <tr>
                        <td style="font-weight: 600;">${emp.nombre}</td>
                        <td>${emp.direccion || '-'}</td>
                        <td>${emp.contacto || '-'}</td>
                        <td>
                            <button class="btn-action" style="color: var(--primary);" onclick="verEmpresa('${emp.id}')">Ver</button>
                            <button class="btn-action" style="color: #f59e0b;" onclick="editarEmpresa('${emp.id}', '${emp.nombre}', '${emp.direccion}', '${emp.contacto}')">Editar</button>
                            <button class="btn-action" style="color: #dc2626;" onclick="borrarEmpresa('${emp.id}', '${emp.nombre}')">Eliminar</button>
                        </td>
                    </tr>
                `;
            });
        }

        // 2. NUEVA EMPRESA
        async function nuevaEmpresa() {
            const nombre = prompt("Nombre de la empresa:");
            if (!nombre) return;
            const direccion = prompt("Dirección:");
            const contacto = prompt("Nombre de contacto:");

            const { error } = await client.from('empresas').insert([{ nombre, direccion, contacto }]);
            
            if (error) alert("Error: " + error.message);
            else cargarEmpresas();
        }

        // 3. EDITAR EMPRESA
        async function editarEmpresa(id, nombreAct, dirAct, contAct) {
            const nuevoNombre = prompt("Nombre:", nombreAct);
            if (!nuevoNombre) return;
            const nuevaDir = prompt("Dirección:", dirAct);
            const nuevoCont = prompt("Contacto:", contAct);

            const { error } = await client.from('empresas')
                .update({ nombre: nuevoNombre, direccion: nuevaDir, contacto: nuevoCont })
                .eq('id', id);

            if (error) alert(error.message);
            else cargarEmpresas();
        }

        // 4. BORRAR EMPRESA
        async function borrarEmpresa(id, nombre) {
            if (!confirm(`¿Estás seguro de eliminar a ${nombre}?`)) return;
            const { error } = await client.from('empresas').delete().eq('id', id);
            
            if (error) alert(error.message);
            else cargarEmpresas();
        }

      // 5. VER EMPRESA
function verEmpresa(id) {
   
    window.location.href = `empresa_detalle.html?id=${id}`; 
}

        window.onload = () => {
            checkAuth();
            cargarEmpresas();
        };
    </script>
</body>
</html>
