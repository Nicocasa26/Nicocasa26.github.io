<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Empresas | CONEMAT</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
padding:30px;
background:#f5f6f7;
}

button{
padding:6px 10px;
margin-right:5px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:8px;
font-size:14px;
}

th{
background:#e5e7eb;
}

.ver{
background:#2563eb;
color:white;
border:none;
}

.edit{
background:#f59e0b;
color:white;
border:none;
}

.delete{
background:#dc2626;
color:white;
border:none;
}

</style>

</head>

<body>

<h2>Empresas</h2>

<button onclick="volver()">← Volver</button>
<button onclick="agregarEmpresa()">+ Agregar empresa</button>

<table>

<thead>
<tr>
<th>Empresa</th>
<th>Dirección</th>
<th>Contacto</th>
<th>Estado</th>
<th>Acción</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>

<script>

const SUPABASE_URL="https://brdekhbqophvcobhxdgc.supabase.co"
const SUPABASE_KEY="sb_publishable_CTkAN6flGJDQGVYV2VDUTg_Ov8CuhXn"

const {createClient}=supabase
const client=createClient(SUPABASE_URL,SUPABASE_KEY)

/* NAV */

function volver(){
window.location.href="index.html"
}

/* CARGAR EMPRESAS */

async function cargarEmpresas(){

const {data}=await client
.from("empresas")
.select("*")
.order("nombre")

const tabla=document.getElementById("tabla")
tabla.innerHTML=""

data.forEach(e=>{

tabla.innerHTML+=`
<tr>

<td>${e.nombre}</td>

<td>${e.direccion}</td>

<td>${e.contacto}</td>

<td style="color:green;font-weight:bold">Activa</td>

<td>

<button class="ver" onclick="verEmpresa('${e.id}')">
Ver
</button>

<button class="edit" onclick="editarEmpresa('${e.id}','${e.nombre}','${e.direccion}','${e.contacto}')">
Editar
</button>

<button class="delete" onclick="eliminarEmpresa('${e.id}')">
Eliminar
</button>

</td>

</tr>
`

})

}

/* VER EMPRESA */

function verEmpresa(id){

window.location.href=`empresa_detalle.html?id=${id}`

}

/* AGREGAR */

async function agregarEmpresa(){

const nombre=prompt("Nombre empresa")
if(!nombre) return

const direccion=prompt("Dirección")
if(!direccion) return

const contacto=prompt("Contacto")
if(!contacto) return

await client
.from("empresas")
.insert({
nombre,
direccion,
contacto
})

cargarEmpresas()

}

/* EDITAR */

async function editarEmpresa(id,nombre,direccion,contacto){

const nuevoNombre=prompt("Nombre empresa",nombre)
if(!nuevoNombre) return

const nuevaDireccion=prompt("Dirección",direccion)
if(!nuevaDireccion) return

const nuevoContacto=prompt("Contacto",contacto)
if(!nuevoContacto) return

const {error}=await client
.from("empresas")
.update({
nombre:nuevoNombre,
direccion:nuevaDireccion,
contacto:nuevoContacto
})
.eq("id",id)

if(error){
alert("Error al actualizar")
return
}

cargarEmpresas()

}

/* ELIMINAR */

async function eliminarEmpresa(id){

if(!confirm("¿Eliminar empresa?")) return

const {error}=await client
.from("empresas")
.delete()
.eq("id",id)

if(error){
alert("Error al eliminar")
return
}

cargarEmpresas()

}

cargarEmpresas()

</script>

</body>
</html>
