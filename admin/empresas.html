<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Empresas | CONEMAT</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6f8;
}

.header {
  background: white;
  padding: 20px 40px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.container {
  padding: 40px;
}

/* TOP BAR */
.topbar {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
}

.topbar input {
  padding: 10px;
  width: 250px;
}

.topbar button {
  background: #2563eb;
  color: white;
  border: none;
  padding: 10px 14px;
  border-radius: 6px;
  cursor: pointer;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 14px;
  text-align: left;
}

th {
  background: #f1f5f9;
}

tr:hover {
  background: #f9fafb;
}

/* BADGE */
.badge {
  padding: 5px 10px;
  border-radius: 6px;
  color: white;
  font-size: 12px;
}

.activa {
  background: #22c55e;
}

/* BOTONES */
.actions button {
  border: none;
  padding: 6px 10px;
  margin-right: 5px;
  border-radius: 6px;
  cursor: pointer;
}

.ver { background: #3b82f6; color: white; }
.editar { background: #f59e0b; color: white; }
.eliminar { background: #ef4444; color: white; }

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.4);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  padding: 25px;
  border-radius: 10px;
  width: 400px;
}

.modal input {
  width: 100%;
  margin-bottom: 10px;
  padding: 10px;
}

.modal button {
  width: 100%;
  padding: 10px;
  background: #2563eb;
  color: white;
  border: none;
}
</style>
</head>

<body>

<div class="header">
  <h2>Empresas</h2>
</div>

<div class="container">

  <div class="topbar">
    <input type="text" id="buscar" placeholder="Buscar empresa...">
    <button onclick="abrirModal()">+ Nueva empresa</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Empresa</th>
        <th>Dirección</th>
        <th>Contacto</th>
        <th>Estado</th>
        <th>Acción</th>
      </tr>
    </thead>
    <tbody id="tablaEmpresas"></tbody>
  </table>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Nueva Empresa</h3>
    <input id="nombre" placeholder="Nombre">
    <input id="direccion" placeholder="Dirección">
    <input id="contacto" placeholder="Contacto">
    <button onclick="guardarEmpresa()">Guardar</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL = "https://brdekhbqophvcobhxdgc.supabase.co";
const SUPABASE_KEY = "sb_publishable_CTkAN6flGJDQGVYV2VDUTg_Ov8CuhXn";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// CARGAR EMPRESAS
async function cargarEmpresas() {

  const { data } = await supabaseClient
    .from("empresas")
    .select("*");

  mostrar(data);
}

function mostrar(data) {

  const tabla = document.getElementById("tablaEmpresas");
  tabla.innerHTML = "";

  data.forEach(e => {

    tabla.innerHTML += `
      <tr>
        <td>${e.nombre}</td>
        <td>${e.direccion}</td>
        <td>${e.contacto}</td>
        <td><span class="badge activa">Activa</span></td>
        <td class="actions">
          <button class="ver">Ver</button>
          <button class="editar">Editar</button>
          <button class="eliminar" onclick="eliminar('${e.id}')">Eliminar</button>
        </td>
      </tr>
    `;
  });
}

// BUSCADOR
document.getElementById("buscar").addEventListener("input", async (e) => {

  const valor = e.target.value;

  const { data } = await supabaseClient
    .from("empresas")
    .select("*")
    .ilike("nombre", `%${valor}%`);

  mostrar(data);
});

// MODAL
function abrirModal() {
  document.getElementById("modal").style.display = "flex";
}

// GUARDAR
async function guardarEmpresa() {

  const nombre = document.getElementById("nombre").value;
  const direccion = document.getElementById("direccion").value;
  const contacto = document.getElementById("contacto").value;

  await supabaseClient.from("empresas").insert([
    { nombre, direccion, contacto }
  ]);

  document.getElementById("modal").style.display = "none";
  cargarEmpresas();
}

// ELIMINAR
async function eliminar(id) {

  if (!confirm("¿Eliminar empresa?")) return;

  await supabaseClient
    .from("empresas")
    .delete()
    .eq("id", id);

  cargarEmpresas();
}

cargarEmpresas();

</script>

</body>
</html>
