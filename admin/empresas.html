<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Empresas | CONEMAT</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
padding:30px;
background:#f5f6f7;
}

button{
padding:6px 10px;
margin-right:5px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:8px;
font-size:14px;
}

th{
background:#e5e7eb;
}

.ver{
background:#2563eb;
color:white;
border:none;
}

.edit{
background:#f59e0b;
color:white;
border:none;
}

.delete{
background:#dc2626;
color:white;
border:none;
}

#buscarEmpresa{
padding:8px;
width:250px;
margin-top:10px;
}

</style>

</head>

<body>

<h2>Empresas</h2>

<button onclick="volver()">← Volver</button>
<button onclick="agregarEmpresa()">+ Agregar empresa</button>

<br><br>

<input 
id="buscarEmpresa"
placeholder="Buscar empresa..."
onkeyup="buscarEmpresa()"
>

<table>

<thead>
<tr>
<th>Empresa</th>
<th>Dirección</th>
<th>Contacto</th>
<th>Estado</th>
<th>Acción</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>

<script>

const SUPABASE_URL = "https://brdekhbqophvcobhxdgc.supabase.co";
const SUPABASE_KEY = "sb_publishable_CTkAN6flGJDQGVYV2VDUTg_Ov8CuhXn";

const { createClient } = supabase;
const client = createClient(SUPABASE_URL, SUPABASE_KEY);

let empresas = [];

function volver(){
window.location.href="index.html";
}

async function cargarEmpresas(){

const { data, error } = await client
.from("empresas")
.select("*")
.order("nombre");

if(error){
console.error(error);
alert(error.message);
return;
}

empresas = data || [];

renderEmpresas(empresas);

}

function renderEmpresas(lista){

const tabla = document.getElementById("tabla");

tabla.innerHTML="";

lista.forEach(e=>{

tabla.innerHTML+=`

<tr>

<td>${e.nombre || ""}</td>

<td>${e.direccion || ""}</td>

<td>${e.contacto || ""}</td>

<td style="color:green;font-weight:bold">
Activa
</td>

<td>

<button class="ver"
onclick="verEmpresa('${e.id}')">
Ver
</button>

<button class="edit"
onclick="editarEmpresa('${e.id}','${e.nombre}','${e.direccion}','${e.contacto}')">
Editar
</button>

<button class="delete"
onclick="eliminarEmpresa('${e.id}','${e.nombre}')">
Eliminar
</button>

</td>

</tr>

`

})

}

function buscarEmpresa(){

const texto=document
.getElementById("buscarEmpresa")
.value
.toLowerCase();

const filtradas=empresas.filter(e =>

(e.nombre || "").toLowerCase().includes(texto) ||
(e.direccion || "").toLowerCase().includes(texto) ||
(e.contacto || "").toLowerCase().includes(texto)

)

renderEmpresas(filtradas)

}

function verEmpresa(id){

window.location.href=`empresa_detalle.html?id=${id}`

}

async function agregarEmpresa(){

const nombre=prompt("Nombre empresa")
if(!nombre) return

const direccion=prompt("Dirección")
if(!direccion) return

const contacto=prompt("Contacto")
if(!contacto) return

const { error } = await client
.from("empresas")
.insert([
{
nombre,
direccion,
contacto
}
])

if(error){
console.error(error)
alert(error.message)
return
}

cargarEmpresas()

}

async function editarEmpresa(id,nombre,direccion,contacto){

const nuevoNombre=prompt("Nombre empresa",nombre)
if(!nuevoNombre) return

const nuevaDireccion=prompt("Dirección",direccion)
if(!nuevaDireccion) return

const nuevoContacto=prompt("Contacto",contacto)
if(!nuevoContacto) return

const { error } = await client
.from("empresas")
.update({
nombre:nuevoNombre,
direccion:nuevaDireccion,
contacto:nuevoContacto
})
.eq("id",id)

if(error){
console.error(error)
alert(error.message)
return
}

cargarEmpresas()

}

async function eliminarEmpresa(id,nombre){

const { data:capacitaciones } = await client
.from("capacitaciones_empresas")
.select("id")
.eq("empresa_id",id)

let totalCapacitaciones = capacitaciones?.length || 0
let totalAsistentes = 0

for(let c of capacitaciones || []){

const { data:asis } = await client
.from("asistentes")
.select("id")
.eq("capacitacion_id",c.id)

totalAsistentes += asis?.length || 0

}

const confirmar=confirm(

`¿Eliminar empresa "${nombre}"?

Esto eliminará también:

Capacitaciones: ${totalCapacitaciones}
Asistentes: ${totalAsistentes}

Esta acción NO se puede deshacer.`

)

if(!confirmar) return

const { error } = await client
.from("empresas")
.delete()
.eq("id",id)

if(error){
console.error(error)
alert(error.message)
return
}

cargarEmpresas()

}

cargarEmpresas()

</script>

</body>
</html>
