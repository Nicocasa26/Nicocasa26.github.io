<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Empresas | CONEMAT</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<style>
body { margin:0; font-family: Arial; background:#f4f6f8; }
.header { background:white; padding:20px 40px; box-shadow:0 2px 8px rgba(0,0,0,0.05); }
.container { padding:40px; }
.topbar { display:flex; justify-content:space-between; margin-bottom:20px; }
.topbar input { padding:10px; width:250px; }
.topbar button { background:#2563eb; color:white; border:none; padding:10px 14px; border-radius:6px; cursor:pointer; }
table { width:100%; border-collapse:collapse; background:white; border-radius:10px; overflow:hidden; }
th, td { padding:14px; }
th { background:#f1f5f9; }
tr:hover { background:#f9fafb; }
.actions button { border:none; padding:6px 10px; margin-right:5px; border-radius:6px; cursor:pointer; }
.ver { background:#3b82f6; color:white; }
.eliminar { background:#ef4444; color:white; }

.modal {
  display:none; position:fixed; top:0; left:0;
  width:100%; height:100%; background:rgba(0,0,0,0.4);
  justify-content:center; align-items:center;
}
.modal-content {
  background:white; padding:25px; border-radius:10px; width:400px;
}
.modal input { width:100%; margin-bottom:10px; padding:10px; }
</style>
</head>

<body>

<script>
checkAuth();
</script>

<div class="header">
  <h2>Empresas</h2>
</div>

<div class="container">

  <div class="topbar">
    <input type="text" id="buscar" placeholder="Buscar empresa...">
    <button onclick="abrirModal()">+ Nueva empresa</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Empresa</th>
        <th>Dirección</th>
        <th>Contacto</th>
        <th>Acción</th>
      </tr>
    </thead>
    <tbody id="tablaEmpresas"></tbody>
  </table>

</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Nueva Empresa</h3>
    <input id="nombre" placeholder="Nombre">
    <input id="direccion" placeholder="Dirección">
    <input id="contacto" placeholder="Contacto">
    <button onclick="guardarEmpresa()">Guardar</button>
  </div>
</div>

<script>

async function cargarEmpresas() {
  const { data, error } = await supabaseClient.from("empresas").select("*");

  if (error) {
    console.error(error);
    alert(error.message);
    return;
  }

  const tabla = document.getElementById("tablaEmpresas");
  tabla.innerHTML = "";

  data.forEach(e => {
    tabla.innerHTML += `
      <tr>
        <td>${e.nombre}</td>
        <td>${e.direccion ?? "-"}</td>
        <td>${e.contacto ?? "-"}</td>
        <td class="actions">
          <button class="ver" onclick="verEmpresa('${e.id}')">Ver</button>
          <button class="eliminar" onclick="eliminarEmpresa('${e.id}')">Eliminar</button>
        </td>
      </tr>
    `;
  });
}

function abrirModal() {
  document.getElementById("modal").style.display = "flex";
}

async function guardarEmpresa() {

  const nombre = document.getElementById("nombre").value;
  const direccion = document.getElementById("direccion").value;
  const contacto = document.getElementById("contacto").value;

  if (!nombre) return alert("Nombre requerido");

  const { error } = await supabaseClient.from("empresas").insert([
    { nombre, direccion, contacto }
  ]);

  if (error) {
    console.error(error);
    alert(error.message);
    return;
  }

  document.getElementById("modal").style.display = "none";

  cargarEmpresas();
}

function verEmpresa(id) {
  window.location.href = `empresa_detalle.html?id=${id}`;
}

async function eliminarEmpresa(id) {

  if (!confirm("¿Eliminar empresa?")) return;

  const { error } = await supabaseClient
    .from("empresas")
    .delete()
    .eq("id", id);

  if (error) {
    console.error(error);
    alert(error.message);
    return;
  }

  cargarEmpresas();
}

document.getElementById("buscar").addEventListener("input", async (e) => {
  const valor = e.target.value;

  const { data } = await supabaseClient
    .from("empresas")
    .select("*")
    .ilike("nombre", `%${valor}%`);

  if (data) cargarEmpresas();
});

cargarEmpresas();

</script>

</body>
</html>
