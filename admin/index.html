<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | CONEMAT</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <script>
        const SUPABASE_URL = "https://brdekhbqophvcobhxdgc.supabase.co";
        const SUPABASE_KEY = "sb_publishable_CTkAN6flGJDQGVYV2VDUTg_Ov8CuhXn";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        try { if (typeof checkAuth === 'function') { checkAuth(); } } catch(e) { console.warn("Auth check skip"); }
    </script>
    <style>
        :root { --primary: #2563eb; --accent: #7c3aed; --bg: #f4f6f8; --text: #1e293b; --danger: #ef4444; --success: #10b981; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
        .header { background: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .header h1 { margin: 0; font-size: 20px; color: var(--primary); font-weight: 700; }
        .container { padding: 30px; max-width: 1200px; margin: 0 auto; }
        .kpis { display: flex; gap: 20px; margin-bottom: 30px; }
        .kpi { flex: 1; background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .kpi h2 { margin: 0; font-size: 28px; color: var(--primary); }
        .kpi p { margin: 5px 0 0; color: #64748b; font-weight: 600; text-transform: uppercase; font-size: 11px; }
        .ai-box { background: white; padding: 25px; border-radius: 16px; margin-bottom: 30px; border: 2px solid #8b5cf61a; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .ai-input-group { display: flex; gap: 10px; }
        .ai-input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; outline: none; }
        .btn-ai { background: var(--accent); color: white; border: none; padding: 0 20px; border-radius: 10px; cursor: pointer; font-weight: 600; }
        #statusIA { margin-top: 15px; display: none; padding: 15px; background: #f8fafc; border-radius: 10px; border-left: 4px solid var(--accent); }
        #textoRespuestaIA { margin: 0; font-size: 14px; white-space: pre-line; color: #334155; line-height: 1.6; }
        .cards { display: flex; gap: 20px; }
        .card { flex: 1; background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .card button { padding: 10px; border: none; border-radius: 8px; background: var(--primary); color: white; cursor: pointer; width: 100%; font-weight: 600; margin-top: 10px;}
    </style>
</head>
<body>
    <div class="header">
        <h1>CONEMAT – Gestión Inteligente</h1>
        <button onclick="logout()" style="background:var(--danger); color:white; border:none; padding:8px 15px; border-radius:6px; cursor:pointer;">Cerrar sesión</button>
    </div>
    <div class="container">
        <div class="kpis">
            <div class="kpi"><h2 id="totalEmpresas">-</h2><p>Empresas</p></div>
            <div class="kpi"><h2 id="totalCapacitaciones">-</h2><p>Capacitaciones</p></div>
            <div class="kpi"><h2 id="totalAsistentes">-</h2><p>Asistentes</p></div>
        </div>
        <div class="ai-box">
            <h3>✨ Asistente CONEMAT AI</h3>
            <div class="ai-input-group">
                <input type="text" id="inputIA" class="ai-input" placeholder="Ej: Asigná RCP a Polytemp / ¿Quiénes asistieron a RCP en Polytemp?">
                <button onclick="procesarConIA()" class="btn-ai" id="btnIA">Ejecutar</button>
            </div>
            <div id="statusIA"><p id="textoRespuestaIA"></p></div>
        </div>
        <div class="cards">
            <div class="card">
                <h3>Empresas</h3>
                <button onclick="location.href='empresas.html'">Gestionar</button>
            </div>
            <div class="card">
                <h3>Capacitaciones</h3>
                <button onclick="location.href='capacitaciones_base.html'">Ver Base</button>
            </div>
        </div>
    </div>

    <script>
    async function cargarKPIs() {
        try {
            const { count: nEmp } = await supabaseClient.from("empresas").select("*", { count: "exact", head: true });
            const { count: nCap } = await supabaseClient.from("capacitaciones_empresas").select("*", { count: "exact", head: true });
            const { count: nAsi } = await supabaseClient.from("asistentes").select("*", { count: "exact", head: true });
            document.getElementById("totalEmpresas").innerText = nEmp || 0;
            document.getElementById("totalCapacitaciones").innerText = nCap || 0;
            document.getElementById("totalAsistentes").innerText = nAsi || 0;
        } catch (e) { console.error(e); }
    }

    async function obtenerContextoCompleto() {
        const { data: emps } = await supabaseClient.from('empresas').select('id, nombre');
        const { data: baseCaps } = await supabaseClient.from('capacitaciones_base').select('id, nombre');
        const { data: asignadas } = await supabaseClient.from('capacitaciones_empresas').select(`
            id, link_publico, 
            empresas(nombre), 
            capacitaciones_base(nombre)
        `);
        return { emps, baseCaps, asignadas };
    }

    async function consultarAsistentes(asignacionId) {
        const { data, error } = await supabaseClient
            .from('asistentes')
            .select('nombre, apellido, dni, fecha_registro')
            .eq('capacitacion_empresa_id', asignacionId);
        return error ? [] : data;
    }

    async function ejecutarAsignacion(empresaNombre, cursoNombre) {
        try {
            const { emps, baseCaps } = await obtenerContextoCompleto();
            const empresa = emps.find(e => e.nombre.toLowerCase().includes(empresaNombre.toLowerCase()));
            const curso = baseCaps.find(c => c.nombre.toLowerCase().includes(cursoNombre.toLowerCase()));

            if (!empresa || !curso) return { exito: false, msg: "Empresa o curso no encontrados." };

            const linkId = crypto.randomUUID();
            const hoy = new Date();
            const vto = new Date(); vto.setDate(hoy.getDate() + 30); // 30 días de vigencia

            const { error } = await supabaseClient.from('capacitaciones_empresas').insert([{
                empresa_id: empresa.id,
                capacitacion_base_id: curso.id,
                link_publico: linkId,
                fecha_inicio: hoy.toISOString().split('T')[0],
                fecha_vencimiento: vto.toISOString().split('T')[0],
                estado: 'vigente'
            }]);

            return error ? { exito: false, msg: error.message } : { exito: true, link: `https://conemat.com.ar/capacitacion.html?id=${linkId}`, empresa: empresa.nombre, curso: curso.nombre };
        } catch (e) { return { exito: false, msg: e.message }; }
    }

    async function procesarConIA() {
        const input = document.getElementById("inputIA");
        const resElem = document.getElementById("textoRespuestaIA");
        const pregunta = input.value.trim();
        if (!pregunta) return;

        document.getElementById("statusIA").style.display = "block";
        resElem.innerText = "Consultando base de datos...";

        try {
            const contexto = await obtenerContextoCompleto();
            const { data: config } = await supabaseClient.from('configuracion_ia').select('valor').eq('clave_nombre', 'gemini_api_key').single();
            
            const promptContexto = `Datos: ${JSON.stringify(contexto)}.
            REGLAS JSON:
            1. Asignar/Crear link: {"accion": "asignar", "empresa": "...", "curso": "..."}
            2. Ver asistentes: {"accion": "ver_asistentes", "id_asignacion": "..."}
            3. Otros: texto libre.`;

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${config.valor.trim()}`;
            const res = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: promptContexto + "\n\nUsuario: " + pregunta }] }] })
            });

            const result = await res.json();
            const respuestaRaw = result.candidates[0].content.parts[0].text.trim().replace(/```json|```/g, "");

            if (respuestaRaw.startsWith('{')) {
                const datos = JSON.parse(respuestaRaw);
                if (datos.accion === "asignar") {
                    const r = await ejecutarAsignacion(datos.empresa, datos.curso);
                    resElem.innerHTML = r.exito ? `✅ <b>Asignado:</b> ${r.curso} en ${r.empresa}.<br>🔗 <b>Link:</b> <a href="${r.link}" target="_blank">${r.link}</a>` : `❌ ${r.msg}`;
                } else if (datos.accion === "ver_asistentes") {
                    const lista = await consultarAsistentes(datos.id_asignacion);
                    if (lista.length === 0) {
                        resElem.innerText = "Aún no hay asistentes registrados para esta capacitación.";
                    } else {
                        let tabla = "<b>Listado de Asistentes:</b><br><table style='width:100%; border-collapse: collapse; margin-top:10px;'>";
                        tabla += "<tr style='background:#eee'><th>Nombre</th><th>DNI</th></tr>";
                        lista.forEach(a => { tabla += `<tr style='border-bottom:1px solid #ddd'><td>${a.nombre} ${a.apellido}</td><td>${a.dni}</td></tr>`; });
                        tabla += "</table>";
                        resElem.innerHTML = tabla;
                    }
                }
            } else {
                resElem.innerHTML = respuestaRaw.replace(/\n/g, "<br>");
            }
            cargarKPIs();
        } catch (e) { resElem.innerText = "Error procesando la solicitud."; }
        finally { input.value = ""; }
    }

    document.addEventListener('DOMContentLoaded', () => {
        cargarKPIs();
        document.getElementById("inputIA").addEventListener("keypress", (e) => { if (e.key === "Enter") procesarConIA(); });
    });
    </script>
</body>
</html>
