<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | CONEMAT</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>

    <script>
        const SUPABASE_URL = "https://brdekhbqophvcobhxdgc.supabase.co";
        const SUPABASE_KEY = "sb_publishable_CTkAN6flGJDQGVYV2VDUTg_Ov8CuhXn";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        if (typeof checkAuth === 'function') { checkAuth(); }
    </script>

    <style>
        :root { --primary: #2563eb; --accent: #7c3aed; --bg: #f4f6f8; --text: #1e293b; --danger: #ef4444; --success: #10b981; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
        .header { background: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .header h1 { margin: 0; font-size: 20px; color: var(--primary); }
        .container { padding: 30px; max-width: 1200px; margin: 0 auto; }
        .kpis { display: flex; gap: 20px; margin-bottom: 30px; }
        .kpi { flex: 1; background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; text-align: center; }
        .kpi h2 { margin: 0; font-size: 28px; color: var(--primary); }
        .ai-box { background: white; padding: 25px; border-radius: 16px; border: 2px solid #8b5cf61a; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .ai-input-group { display: flex; gap: 10px; margin-top: 15px; }
        .ai-input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; }
        .btn-ai { background: var(--accent); color: white; border: none; padding: 0 20px; border-radius: 10px; cursor: pointer; }
        #statusIA { margin-top: 15px; display: none; padding: 15px; background: #f8fafc; border-radius: 10px; border-left: 4px solid var(--accent); }
        .logout { background: var(--danger); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
    </style>
</head>

<body>
    <div class="header">
        <h1>CONEMAT – Gestión Inteligente</h1>
        <button class="logout" onclick="logout()">Cerrar sesión</button>
    </div>

    <div class="container">
        <div class="kpis">
            <div class="kpi"><h2 id="totalEmpresas">-</h2><p>Empresas</p></div>
            <div class="kpi"><h2 id="totalCapacitaciones">-</h2><p>Capacitaciones</p></div>
            <div class="kpi"><h2 id="totalAsistentes">-</h2><p>Asistentes</p></div>
        </div>

        <div class="ai-box">
            <h2>✨ Asistente CONEMAT AI</h2>
            <div class="ai-input-group">
                <input type="text" id="inputIA" class="ai-input" placeholder="Ej: Agregá la empresa Nico SRL en calle Mitre 100 y asignale RCP">
                <button onclick="procesarConIA()" class="btn-ai" id="btnIA">Ejecutar</button>
            </div>
            <div id="statusIA">
                <p id="textoRespuestaIA">Analizando...</p>
            </div>
        </div>
    </div>

    <script>
    async function cargarKPIs() {
        const { count: nEmp } = await supabaseClient.from("empresas").select("*", { count: "exact", head: true });
        const { count: nCap } = await supabaseClient.from("capacitaciones").select("*", { count: "exact", head: true });
        const { count: nAsi } = await supabaseClient.from("asistentes").select("*", { count: "exact", head: true });
        document.getElementById("totalEmpresas").innerText = nEmp || 0;
        document.getElementById("totalCapacitaciones").innerText = nCap || 0;
        document.getElementById("totalAsistentes").innerText = nAsi || 0;
    }

    // --- CARGA DE EMPRESA (Corregido según captura) ---
    async function ejecutarCargaEmpresa(nombre, direccion) {
        const { error } = await supabaseClient
            .from('empresas')
            .insert([{ nombre: nombre, direccion: direccion }]); // Cambiado nombre_empresa -> nombre
        return error ? { exito: false, msg: error.message } : { exito: true };
    }

    // --- CARGA DE CAPACITACIÓN (Según captura de tabla 'capacitaciones') ---
    async function ejecutarCargaCapacitacion(empresa, tema) {
        const { error } = await supabaseClient
            .from('capacitaciones')
            .insert([{ empresa: empresa, tema: tema, activa: true }]);
        return error ? { exito: false, msg: error.message } : { exito: true };
    }

    async function procesarConIA() {
        const input = document.getElementById("inputIA");
        const respuesta = document.getElementById("textoRespuestaIA");
        const pregunta = input.value.trim();
        if (!pregunta) return;

        input.value = "";
        document.getElementById("statusIA").style.display = "block";
        respuesta.innerText = "CONEMAT AI procesando orden...";

        const contexto = `Eres el gestor de CONEMAT. 
        Si el usuario quiere cargar/crear una empresa y/o asignar una capacitación, responde SOLO un JSON:
        {"accion": "crear_todo", "nombre": "Nombre Empresa", "direccion": "Calle 123", "tema": "Nombre Capacitación"}.
        Si no hay capacitación, pon "tema": null. Si no hay dirección, pon "direccion": "No especificada".
        Si es una charla normal, responde texto.`;

        try {
            const { data: config } = await supabaseClient.from('configuracion_ia').select('valor').eq('clave_nombre', 'gemini_api_key').single();
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${config.valor.trim()}`;

            const res = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: contexto + "\n\nUsuario: " + pregunta }] }] })
            });

            const result = await res.json();
            let textoIA = result.candidates[0].content.parts[0].text.trim().replace(/```json|```/g, "");

            if (textoIA.startsWith('{')) {
                const datos = JSON.parse(textoIA);
                let resumen = "";

                // 1. Cargamos Empresa
                const resEmp = await ejecutarCargaEmpresa(datos.nombre, datos.direccion);
                resumen += resEmp.exito ? `✅ Empresa "${datos.nombre}" creada.<br>` : `❌ Error Empresa: ${resEmp.msg}<br>`;

                // 2. Cargamos Capacitación (si existe en el comando)
                if (datos.tema) {
                    const resCap = await ejecutarCargaCapacitacion(datos.nombre, datos.tema);
                    resumen += resCap.exito ? `✅ Capacitación "${datos.tema}" asignada.` : `❌ Error Capacitación: ${resCap.msg}`;
                }

                respuesta.innerHTML = resumen;
                cargarKPIs();
            } else {
                respuesta.innerText = textoIA;
            }
        } catch (e) {
            respuesta.innerText = "Error: " + e.message;
        }
    }

    cargarKPIs();
    </script>
</body>
</html>
