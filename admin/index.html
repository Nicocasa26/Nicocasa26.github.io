<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | CONEMAT</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>

    <script>
        const SUPABASE_URL = "https://brdekhbqophvcobhxdgc.supabase.co";
        const SUPABASE_KEY = "sb_publishable_CTkAN6flGJDQGVYV2VDUTg_Ov8CuhXn";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // Ejecutamos auth si existe la función
        try { if (typeof checkAuth === 'function') { checkAuth(); } } catch(e) { console.warn("Auth no disponible"); }
    </script>

    <style>
        :root { --primary: #2563eb; --accent: #7c3aed; --bg: #f4f6f8; --text: #1e293b; --danger: #ef4444; --success: #10b981; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
        .header { background: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .header h1 { margin: 0; font-size: 20px; color: var(--primary); font-weight: 700; }
        .logout { background: var(--danger); color: white; border: none; padding: 8px 16px; cursor: pointer; border-radius: 6px; font-weight: 600; }
        .container { padding: 30px; max-width: 1200px; margin: 0 auto; }
        .kpis { display: flex; gap: 20px; margin-bottom: 30px; }
        .kpi { flex: 1; background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; text-align: center; }
        .kpi h2 { margin: 0; font-size: 28px; color: var(--primary); }
        .kpi p { margin: 5px 0 0; color: #64748b; font-weight: 600; text-transform: uppercase; font-size: 11px; }
        .ai-box { background: white; padding: 25px; border-radius: 16px; margin-bottom: 30px; border: 2px solid #8b5cf61a; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .ai-input-group { display: flex; gap: 10px; }
        .ai-input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; outline: none; }
        .btn-ai { background: var(--accent); color: white; border: none; padding: 0 20px; border-radius: 10px; cursor: pointer; font-weight: 600; }
        .btn-ai:disabled { background: #ccc; cursor: not-allowed; }
        #statusIA { margin-top: 15px; display: none; padding: 15px; background: #f8fafc; border-radius: 10px; border-left: 4px solid var(--accent); }
        #textoRespuestaIA { margin: 0; font-size: 14px; white-space: pre-line; color: #334155; line-height: 1.6; }
        .cards { display: flex; gap: 20px; }
        .card { flex: 1; background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .card button { padding: 10px; border: none; border-radius: 8px; background: var(--primary); color: white; cursor: pointer; width: 100%; font-weight: 600; margin-top: 10px;}
    </style>
</head>

<body>
    <div class="header">
        <h1>CONEMAT – Gestión Inteligente</h1>
        <button class="logout" onclick="logout()">Cerrar sesión</button>
    </div>

    <div class="container">
        <div class="kpis">
            <div class="kpi"><h2 id="totalEmpresas">-</h2><p>Empresas</p></div>
            <div class="kpi"><h2 id="totalCapacitaciones">-</h2><p>Capacitaciones</p></div>
            <div class="kpi"><h2 id="totalAsistentes">-</h2><p>Asistentes</p></div>
        </div>

        <div class="ai-box">
            <h3>✨ Asistente CONEMAT AI</h3>
            <div class="ai-input-group">
                <input type="text" id="inputIA" class="ai-input" placeholder="¿Qué empresas tengo? / Borrá X / Cargá Y">
                <button onclick="procesarConIA()" class="btn-ai" id="btnIA">Ejecutar</button>
            </div>
            <div id="statusIA"><p id="textoRespuestaIA"></p></div>
        </div>

        <div class="cards">
            <div class="card">
                <h3>Empresas</h3>
                <p>Administración de clientes y establecimientos.</p>
                <button onclick="location.href='empresas.html'">Gestionar</button>
            </div>
            <div class="card">
                <h3>Capacitaciones</h3>
                <p>Biblioteca de contenidos y base de formación.</p>
                <button onclick="location.href='capacitaciones_base.html'">Ver Base</button>
            </div>
        </div>
    </div>

    <script>
    // 1. CARGAR INDICADORES
    async function cargarKPIs() {
        try {
            const { count: nEmp } = await supabaseClient.from("empresas").select("*", { count: "exact", head: true });
            const { count: nCap } = await supabaseClient.from("capacitaciones").select("*", { count: "exact", head: true });
            const { count: nAsi } = await supabaseClient.from("asistentes").select("*", { count: "exact", head: true });
            document.getElementById("totalEmpresas").innerText = nEmp || 0;
            document.getElementById("totalCapacitaciones").innerText = nCap || 0;
            document.getElementById("totalAsistentes").innerText = nAsi || 0;
        } catch (e) { console.error("Error KPIs:", e); }
    }

    // 2. OBTENER DATOS PARA LA IA
    async function obtenerContextoReal() {
        try {
            const { data: emps } = await supabaseClient.from('empresas').select('nombre, direccion');
            const { data: caps } = await supabaseClient.from('capacitaciones').select('empresa, tema, slug');
            return `Empresas: ${JSON.stringify(emps || [])}. Capas: ${JSON.stringify(caps || [])}.`;
        } catch(e) { return "Error leyendo base de datos."; }
    }

    // 3. ACCIONES DE BASE DE DATOS
    async function ejecutarCargaEmpresa(nombre, direccion) {
        const { error } = await supabaseClient.from('empresas').insert([{ nombre, direccion, activa: true }]);
        return error ? { exito: false, msg: error.message } : { exito: true };
    }

    async function ejecutarBorrarEmpresa(nombre) {
        const { error } = await supabaseClient.from('empresas').delete().eq('nombre', nombre);
        return error ? { exito: false, msg: error.message } : { exito: true };
    }

    async function ejecutarCargaCapacitacion(empresa, tema) {
        const hoy = new Date();
        const vto = new Date(); vto.setFullYear(hoy.getFullYear() + 1);
        const slugSimple = (tema + "-" + empresa).toLowerCase().replace(/[^a-z0-9]/g, '-');
        
        const { error } = await supabaseClient.from('capacitaciones').insert([{ 
            empresa, tema, slug: slugSimple, activa: true, 
            fecha_inicio: hoy.toISOString().split('T')[0], 
            fecha_vencimiento: vto.toISOString().split('T')[0] 
        }]);
        return error ? { exito: false, msg: error.message } : { exito: true };
    }

    // 4. PROCESAR CONSULTA
    async function procesarConIA() {
        const input = document.getElementById("inputIA");
        const btn = document.getElementById("btnIA");
        const status = document.getElementById("statusIA");
        const respuesta = document.getElementById("textoRespuestaIA");

        const pregunta = input.value.trim();
        if (!pregunta) return;

        btn.disabled = true;
        status.style.display = "block";
        respuesta.innerText = "Consultando base de datos...";

        try {
            const dbContext = await obtenerContextoReal();
            const { data: config, error: errConf } = await supabaseClient.from('configuracion_ia').select('valor').eq('clave_nombre', 'gemini_api_key').single();
            
            if (errConf || !config) throw new Error("No se encontró la API Key en la tabla configuracion_ia");

            const contexto = `Eres el asistente de CONEMAT. DATOS REALES: ${dbContext}. 
            REGLAS:
            1. Si piden cargar: {"accion": "crear", "nombre": "...", "direccion": "...", "tema": "..."}
            2. Si piden borrar: {"accion": "borrar", "nombre": "..."}
            3. Otros: Responde amablemente. Link base: https://conemat.vercel.app/capacitacion.html?slug=`;

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${config.valor.trim()}`;
            const res = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: contexto + "\n\nUsuario: " + pregunta }] }] })
            });

            const result = await res.json();
            const textoIA = result.candidates[0].content.parts[0].text.trim().replace(/```json|```/g, "");

            if (textoIA.startsWith('{')) {
                const datos = JSON.parse(textoIA);
                if (datos.accion === "borrar") {
                    const r = await ejecutarBorrarEmpresa(datos.nombre);
                    respuesta.innerText = r.exito ? `🗑️ "${datos.nombre}" borrada.` : `❌ Error: ${r.msg}`;
                } else if (datos.accion === "crear") {
                    const rE = await ejecutarCargaEmpresa(datos.nombre, datos.direccion || "No especificada");
                    if (rE.exito) {
                        let msg = `✅ Empresa "${datos.nombre}" creada.`;
                        if (datos.tema) {
                            const rC = await ejecutarCargaCapacitacion(datos.nombre, datos.tema);
                            msg += rC.exito ? `<br>✅ Capacitación "${datos.tema}" asignada.` : `<br>❌ Error Capa: ${rC.msg}`;
                        }
                        respuesta.innerHTML = msg;
                    } else { respuesta.innerText = `❌ Error Empresa: ${rE.msg}`; }
                }
                cargarKPIs();
            } else { respuesta.innerHTML = textoIA.replace(/\n/g, "<br>"); }
        } catch (e) {
            respuesta.innerText = "Error crítico: " + e.message;
            console.error(e);
        } finally {
            btn.disabled = false;
            input.value = "";
        }
    }

    // Inicialización
    document.addEventListener('DOMContentLoaded', () => {
        cargarKPIs();
        document.getElementById("inputIA").addEventListener("keypress", (e) => { if (e.key === "Enter") procesarConIA(); });
    });
    </script>
</body>
</html>
