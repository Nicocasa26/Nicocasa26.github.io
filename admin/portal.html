<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONEMAT | Portal de Gestión</title>
    <style>
        :root { --primary: #2563eb; --secondary: #7c3aed; --bg: #f8fafc; --text: #1e293b; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .header { text-align: center; margin-bottom: 50px; }
        .header h1 { font-size: 2.5rem; color: var(--primary); margin: 0; }
        .container { display: flex; gap: 30px; max-width: 900px; width: 95%; flex-wrap: wrap; justify-content: center; }
        .card { background: white; border-radius: 20px; padding: 40px; flex: 1; min-width: 300px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); transition: transform 0.3s; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; border: 2px solid transparent; }
        .card:hover { transform: translateY(-10px); }
        .card.gestion:hover { border-color: var(--primary); }
        .card.capacitacion:hover { border-color: var(--secondary); }
        .icon { font-size: 60px; margin-bottom: 20px; }
        .btn { padding: 12px 25px; border-radius: 10px; text-decoration: none; color: white; font-weight: 600; margin-top: 20px; }
        .btn-gestion { background: var(--primary); }
        .btn-capa { background: var(--secondary); }
    </style>
</head>
<body>
    <div class="header">
        <h1>CONEMAT</h1>
        <p>Seleccione el área de trabajo</p>
    </div>
    <div class="container">
        <div class="card gestion" onclick="location.href='gestion_hys.html'">
            <div>
                <div class="icon">🏗️</div>
                <h2>Gestión Integral H&S</h2>
                <p>Empresas, Cronogramas de Obra, Visitas Técnicas y Documentación Legal.</p>
            </div>
            <a href="gestion_hys.html" class="btn btn-gestion">ENTRAR</a>
        </div>

        <div class="card capacitacion" onclick="location.href='index_capacitaciones.html'">
            <div>
                <div class="icon">🎓</div>
                <h2>Capacitaciones</h2>
                <p>Cursos, Videos, Registro de Asistentes y generación de Links de Firma.</p>
            </div>
            <a href="index_capacitaciones.html" class="btn btn-capa">ENTRAR</a>
        </div>
    </div>
</body>
</html>
