<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Empresa | CONEMAT</title>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://brdekhbqophvcobhxdgc.supabase.co";
        const SUPABASE_KEY = "sb_publishable_CTkAN6flGJDQGVYV2VDUTg_Ov8CuhXn";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const client = supabaseClient; 
    </script>

    <script src="auth.js"></script>
    <script>checkAuth();</script>

    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --white: #ffffff;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 40px;
            line-height: 1.5;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* HEADER & BOTÓN VOLVER */
        .header-area {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .btn-volver {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: var(--white);
            border: 1px solid var(--border);
            color: var(--text-muted);
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-volver:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateX(-3px);
        }

        h1 { font-size: 28px; margin: 0; font-weight: 800; }
        h2 { font-size: 18px; margin-top: 0; margin-bottom: 20px; color: var(--text-main); font-weight: 700; border-left: 4px solid var(--primary); padding-left: 12px; }

        /* TARJETAS (BOXES) */
        .box {
            background: var(--white);
            padding: 24px;
            margin-bottom: 24px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        /* INFO EMPRESA */
        .empresa-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .info-tag {
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            margin-bottom: 4px;
            display: block;
        }

        .info-value {
            font-size: 16px;
            font-weight: 500;
        }

        /* FORMULARIO ASIGNAR */
        .form-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .form-group {
            flex: 1;
            min-width: 200px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        select, input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus, input:focus {
            border-color: var(--primary);
        }

        .btn-primario {
            background: var(--primary);
            color: white;
            border: none;
            padding: 11px 24px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primario:hover { background: var(--primary-hover); }

        /* TABLA */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: #f1f5f9;
            padding: 14px;
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 700;
        }

        td {
            padding: 14px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        tr:hover { background-color: #fafafa; }

        /* BOTONES TABLA */
        .btn-sm {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid var(--border);
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            margin-right: 4px;
        }

        .btn-sm:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-delete {
            background: #fff1f2;
            color: var(--danger);
            border: none;
        }

        .btn-delete:hover {
            background: var(--danger);
            color: white;
        }

        .status-pill {
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            background: #dcfce7;
            color: #166534;
        }

    </style>
</head>

<body>

<div class="container">
    
    <div class="header-area">
        <button class="btn-volver" onclick="volver()" title="Volver a empresas">←</button>
        <h1 id="empresaNombre">Cargando...</h1>
    </div>

    <!-- TARJETA INFO EMPRESA -->
    <div class="box">
        <div id="empresaInfo" class="empresa-grid">
            <!-- Se llena por JS -->
        </div>
    </div>

    <!-- TARJETA ASIGNAR -->
    <div class="box">
        <h2>Asignar nueva capacitación</h2>
        <div class="form-row">
            <div class="form-group" style="flex: 2;">
                <label>Seleccionar Capacitación</label>
                <select id="capacitacionBase"></select>
            </div>
            <div class="form-group">
                <label>Fecha Inicio</label>
                <input type="date" id="fechaInicio">
            </div>
            <div class="form-group">
                <label>Vencimiento</label>
                <input type="date" id="fechaVencimiento">
            </div>
            <div class="form-group" style="flex: 0;">
                <button class="btn-primario" onclick="asignarCapacitacion()">Asignar</button>
            </div>
        </div>
    </div>

    <!-- TARJETA TABLA -->
    <div class="box">
        <h2>Capacitaciones asignadas</h2>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Capacitación</th>
                        <th>Vigencia</th>
                        <th>Estado</th>
                        <th>Gestión</th>
                        <th style="text-align: right;">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaCapacitaciones">
                    <tr><td colspan="5" style="text-align: center; color: var(--text-muted); padding: 40px;">Cargando capacitaciones...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script>

/* PARAMS */
const params = new URLSearchParams(window.location.search);
const empresaId = params.get("id");

/* FUNCIONES NAVEGACIÓN */
function volver(){
    window.location.href="empresas.html";
}

function generarUUID(){
    return crypto.randomUUID();
}

/* EMPRESA */
async function cargarEmpresa(){
    const {data, error} = await client
        .from("empresas")
        .select("*")
        .eq("id", empresaId)
        .single();

    if(error){
        alert("Error al cargar empresa");
        return;
    }

    document.getElementById("empresaNombre").innerText = data.nombre;

    document.getElementById("empresaInfo").innerHTML = `
        <div class="info-item">
            <span class="info-tag">Dirección</span>
            <div class="info-value">${data.direccion ?? "-"}</div>
        </div>
        <div class="info-item">
            <span class="info-tag">Contacto</span>
            <div class="info-value">${data.contacto ?? "-"}</div>
        </div>
        <div class="info-item">
            <span class="info-tag">Estado Operativo</span>
            <div><span class="status-pill">${data.activa ? "Activa" : "Inactiva"}</span></div>
        </div>
    `;
}

/* CAPACITACIONES BASE (SELECT) */
async function cargarCapacitacionesBase(){
    const {data, error} = await client
        .from("capacitaciones_base")
        .select("*")
        .eq("activa", true);

    if(error) return;

    const select = document.getElementById("capacitacionBase");
    select.innerHTML = "";
    data.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c.id;
        opt.textContent = c.nombre;
        select.appendChild(opt);
    });
}

/* ASIGNAR CAPACITACION */
async function asignarCapacitacion(){
    const capacitacionBaseId = document.getElementById("capacitacionBase").value;
    const fechaInicio = document.getElementById("fechaInicio").value;
    const fechaVencimiento = document.getElementById("fechaVencimiento").value;

    if(!fechaInicio || !fechaVencimiento){
        alert("Por favor, completá las fechas");
        return;
    }

    const linkPublico = generarUUID();

    const {error} = await client
        .from("capacitaciones_empresas")
        .insert([{
            empresa_id: empresaId,
            capacitacion_base_id: capacitacionBaseId,
            fecha_inicio: fechaInicio,
            fecha_vencimiento: fechaVencimiento,
            estado: "vigente",
            link_publico: linkPublico
        }]);

    if(error){
        alert("Error al asignar capacitación");
        return;
    }

    // Reset de campos
    document.getElementById("fechaInicio").value = "";
    document.getElementById("fechaVencimiento").value = "";
    
    cargarCapacitacionesAsignadas();
}

/* ELIMINAR */
async function eliminarCapacitacion(id){
    const confirmar = confirm("¿Eliminar esta capacitación?\n\nSe eliminarán también todos los asistentes registrados.");
    if(!confirmar) return;

    const {error} = await client
        .from("capacitaciones_empresas")
        .delete()
        .eq("id", id);

    if(error) {
        alert("Error al eliminar");
    } else {
        cargarCapacitacionesAsignadas();
    }
}

/* TABLA ASIGNADAS */
async function cargarCapacitacionesAsignadas(){
    const {data, error} = await client
        .from("capacitaciones_empresas")
        .select(`
            id,
            fecha_inicio,
            fecha_vencimiento,
            estado,
            link_publico,
            capacitaciones_base ( nombre )
        `)
        .eq("empresa_id", empresaId);

    if(error) return;

    const tbody = document.getElementById("tablaCapacitaciones");
    tbody.innerHTML = "";

    if(!data.length){
        tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--text-muted); padding: 40px;">No hay capacitaciones asignadas actualmente.</td></tr>`;
        return;
    }

    data.forEach(c => {
        const link = `${window.location.origin}/capacitaciones/capacitacion.html?token=${c.link_publico}`;

        tbody.innerHTML += `
            <tr>
                <td style="font-weight: 600;">${c.capacitaciones_base.nombre}</td>
                <td style="font-size: 13px;">${c.fecha_inicio} al ${c.fecha_vencimiento}</td>
                <td><span class="status-pill">${c.estado}</span></td>
                <td>
                    <button class="btn-sm" onclick="verAsistentes('${c.id}')">Asistentes</button>
                    <button class="btn-sm" onclick="copiarLink('${link}')">Copiar Link</button>
                </td>
                <td style="text-align: right;">
                    <button class="btn-sm btn-delete" onclick="eliminarCapacitacion('${c.id}')">Eliminar</button>
                </td>
            </tr>
        `;
    });
}

/* UTILIDADES */
function copiarLink(link){
    navigator.clipboard.writeText(link);
    alert("¡Link de capacitación copiado al portapapeles!");
}

function verAsistentes(capacitacionEmpresaId){
    window.location.href = `asistentes.html?capacitacion_empresa_id=${capacitacionEmpresaId}`;
}

/* INIT */
cargarEmpresa();
cargarCapacitacionesBase();
cargarCapacitacionesAsignadas();

</script>

</body>
</html>
